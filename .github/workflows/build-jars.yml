name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:

  # ── 1. Build JARs + config.xml ─────────────────────────────────────────
  build-jars:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create DbConfig.java from secrets
        run: |
          mkdir -p src/main/java/DB
          cat > src/main/java/DB/DbConfig.java << 'DBEOF'
          package DB;
          public class DbConfig {
              public static final String url = "${{ secrets.DB_URL }}";
              public static final String user = "${{ secrets.DB_USER }}";
              public static final String password = "${{ secrets.DB_PASSWORD }}";
          }
          DBEOF

      - name: Create SftpConfig.java from secrets
        run: |
          mkdir -p src/main/java/DB
          cat > src/main/java/DB/SftpConfig.java << 'SFTPEOF'
          package DB;
          public class SftpConfig {
              public static final String HOST = "${{ secrets.SFTP_HOST }}";
              public static final int    PORT = ${{ secrets.SFTP_PORT }};
              public static final String USER = "${{ secrets.SFTP_USER }}";
              public static final String PASSWORD = "${{ secrets.SFTP_PASSWORD }}";
              public static final String REMOTE_BASE = "${{ secrets.SFTP_REMOTE_BASE }}";
          }
          SFTPEOF

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Generate update4j config.xml
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/"
          else
            BASE_URL="https://github.com/${{ github.repository }}/releases/latest/download/"
          fi
          echo "Base URL: $BASE_URL"
          java -cp "target/workordermanager-app.jar" main.GenerateConfig \
            "$BASE_URL" \
            "target/" \
            "target/config.xml"

      - name: Upload JARs artifact
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            target/workordermanager-app.jar
            target/workordermanager-bootstrap.jar
            target/config.xml
          retention-days: 1

      - name: Upload JARs to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/workordermanager-app.jar
            target/workordermanager-bootstrap.jar
            target/config.xml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Build Windows EXE ───────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-jars
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: jdk-full
          cache: maven

      - name: Download JARs artifact
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: target/

      - name: Create jpackage input with only bootstrap
        run: New-Item -ItemType Directory -Force -Path jpackage-input; Copy-Item target\workordermanager-bootstrap.jar jpackage-input\
        shell: powershell

      - name: Run jpackage for Windows EXE
        run: |
          $JAVA_HOME = $env:JAVA_HOME
          $VERSION = "${{ github.ref_name }}".TrimStart("v")

          jpackage `
            --type exe `
            --name FixelCRM `
            --app-version $VERSION `
            --input jpackage-input `
            --main-jar workordermanager-bootstrap.jar `
            --main-class main.Launcher `
            --dest build `
            --runtime-image "$JAVA_HOME" `
            --win-menu `
            --win-menu-group FixelCRM `
            --win-shortcut `
            --description "FixelCRM - Work Order Management System"
        shell: powershell

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Build Linux AppImage ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    needs: build-jars
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: jdk-full
          cache: maven

      - name: Download JARs artifact
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: target/

      - name: Create jpackage input with only bootstrap
        run: |
          mkdir -p jpackage-input
          cp target/workordermanager-bootstrap.jar jpackage-input/

      - name: Run jpackage (app-image)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          jpackage \
            --type app-image \
            --name FixelCRM \
            --app-version "$VERSION" \
            --input jpackage-input \
            --main-jar workordermanager-bootstrap.jar \
            --main-class main.Launcher \
            --dest build \
            --runtime-image "$JAVA_HOME" \
            --description "FixelCRM - Work Order Management System"

      - name: Install AppImage dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y squashfs-tools fuse desktop-file-utils

      - name: Download and setup appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /tmp/appimagetool.AppImage
          chmod +x /tmp/appimagetool.AppImage
          cd /tmp && ./appimagetool.AppImage --appimage-extract
          sudo mkdir -p /usr/local/lib/appimagekit
          sudo cp /usr/bin/mksquashfs /usr/local/lib/appimagekit/mksquashfs
          sudo cp /tmp/squashfs-root/usr/bin/appimagetool /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          cp -r build/FixelCRM/* AppDir/
          cp src/main/resources/icon.png AppDir/FixelCRM.png

          cat > AppDir/FixelCRM.desktop << 'EOF'
          [Desktop Entry]
          Name=FixelCRM
          Exec=FixelCRM
          Icon=FixelCRM
          Type=Application
          Categories=Office;
          Comment=FixelCRM - Work Order Management System
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/bin/FixelCRM" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 appimagetool AppDir build/FixelCRM-x86_64.AppImage

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/FixelCRM-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}