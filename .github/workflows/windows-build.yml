name: Build Windows EXE

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create DbConfig.java from secrets
        run: |
          mkdir -p src/main/java/DB
          cat > src/main/java/DB/DbConfig.java << 'DBEOF'
          package DB;
          public class DbConfig {
              public static final String url = "${{ secrets.DB_URL }}";
              public static final String user = "${{ secrets.DB_USER }}";
              public static final String password = "${{ secrets.DB_PASSWORD }}";
          }
          DBEOF
        shell: bash

      - name: Build with Maven
        run: mvn clean package
        shell: cmd

      - name: Download JavaFX SDK
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://download2.gluonhq.com/openjfx/21.0.11/openjfx-21.0.11_windows-x64_bin-sdk.zip" -OutFile "javafx.zip"
          Expand-Archive -Path "javafx.zip" -DestinationPath "."
        shell: powershell

      - name: Run jpackage for Windows EXE
        run: |
          $JAVAFX_PATH = (Get-ChildItem -Path "." -Filter "javafx-sdk-21*" -Directory | Select-Object -First 1).FullName
          $JAVA_HOME = $env:JAVA_HOME
          
          jpackage `
            --type exe `
            --name FixelCRM `
            --app-version 0.0.8 `
            --input target `
            --main-jar workodermanager-1.0-SNAPSHOT.jar `
            --main-class main.Main `
            --dest build `
            --module-path "$JAVAFX_PATH\lib" `
            --add-modules javafx.controls,javafx.fxml,javafx.base,javafx.graphics `
            --java-options "-Djava.library.path=$JAVAFX_PATH\lib" `
            --runtime-image "$JAVA_HOME" `
            --win-menu `
            --win-menu-group FixelCRM `
            --win-shortcut `
            --description "FixelCRM - Work Order Management System"
        shell: powershell

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixelCRM-windows-exe
          path: build/*.exe
          retention-days: 30

      - name: Create Release (on tag push)
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
