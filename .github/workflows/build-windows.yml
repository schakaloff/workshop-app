name: Build Windows EXE

on:
  workflow_run:
    workflows: ["Build JARs & Config"]
    types:
      - completed
    branches:
      - main
  # Allows manual trigger as fallback
  workflow_dispatch:
    inputs:
      run_id:
        description: 'build-jars run ID to download artifact from'
        required: false

jobs:
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve artifact run ID
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Download JARs artifact
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: target/
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download JavaFX SDK
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://download2.gluonhq.com/openjfx/21.0.11/openjfx-21.0.11_windows-x64_bin-sdk.zip" -OutFile "javafx.zip"
          Expand-Archive -Path "javafx.zip" -DestinationPath "."
        shell: powershell

      - name: Run jpackage for Windows EXE
        run: |
          $JAVAFX_PATH = (Get-ChildItem -Path "." -Filter "javafx-sdk-21*" -Directory | Select-Object -First 1).FullName
          $JAVA_HOME = $env:JAVA_HOME

          jpackage `
            --type exe `
            --name FixelCRM `
            --app-version 0.0.8 `
            --input target `
            --main-jar workordermanager-bootstrap.jar `
            --main-class main.Launcher `
            --dest build `
            --module-path "$JAVAFX_PATH\lib" `
            --java-options "-Djava.library.path=$JAVAFX_PATH\lib" `
            --runtime-image "$JAVA_HOME" `
            --win-menu `
            --win-menu-group FixelCRM `
            --win-shortcut `
            --description "FixelCRM - Work Order Management System"
        shell: powershell

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixelCRM-windows-exe
          path: build/*.exe
          retention-days: 30

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.exe
          tag_name: ${{ github.event.workflow_run.head_branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}