name: Build Linux AppImage

on:
  workflow_run:
    workflows: ["Build JARs & Config"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_id:
        description: 'build-jars run ID to download artifact from'
        required: false

jobs:
  build-linux-appimage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve artifact run ID
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          fi

      - name: Download JARs artifact
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: target/
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run jpackage (app-image)
        run: |
          jpackage \
            --type app-image \
            --name FixelCRM \
            --app-version 0.0.8 \
            --input target \
            --main-jar workordermanager-bootstrap.jar \
            --main-class main.Launcher \
            --dest build \
            --linux-shortcut \
            --description "FixelCRM - Work Order Management System"

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          cp -r build/FixelCRM/* AppDir/

          cat > AppDir/FixelCRM.desktop << 'EOF'
          [Desktop Entry]
          Name=FixelCRM
          Exec=FixelCRM
          Icon=FixelCRM
          Type=Application
          Categories=Office;
          Comment=FixelCRM - Work Order Management System
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/bin/FixelCRM" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 appimagetool AppDir build/FixelCRM-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/FixelCRM-x86_64.AppImage
          retention-days: 30

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/FixelCRM-x86_64.AppImage
          tag_name: ${{ github.event.workflow_run.head_branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}